name: social

# Weekly growth automation, Thursdays 16:00 UTC (~noon US Eastern) — ahead of
# weekend planning. Two independent steps:
#   1. Auto-post the week's lineup to Bluesky + X (only platforms whose creds
#      are set; a no-op otherwise — never fails just because keys are missing).
#   2. Email the IG + Reddit draft pack to the owner for MANUAL posting (those
#      platforms ban automation).
#
# Optional secrets (each platform/step activates when its keys are present):
#   Bluesky : BLUESKY_HANDLE, BLUESKY_APP_PASSWORD
#   X       : X_API_KEY, X_API_SECRET, X_ACCESS_TOKEN, X_ACCESS_SECRET
#   Draft   : RESEND_API_KEY + (DRAFTS_TO or DIGEST_TO)
#   Shared  : SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, NEXT_PUBLIC_SITE_URL

on:
  schedule:
    - cron: "0 16 * * 4"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  social:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci

      - name: Auto-post to Bluesky + X
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: npx tsx src/social/post.ts

      - name: Email IG + Reddit draft pack
        if: always() # send drafts even if auto-post failed
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DRAFTS_TO: ${{ secrets.DRAFTS_TO }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
        run: npx tsx src/social/draftpack.ts

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Social automation failed (run ${context.runId})`;
            const body = `The weekly social job failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: "open", labels: "social-failure",
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ["social-failure"],
              });
            }
