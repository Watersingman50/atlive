name: ingest
# registration nudge

# T2: scheduled ingestion. Runs in CI (no Vercel serverless timeout wall).
# Repo secrets required: TM_API_KEY, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY.
# GitHub emails the repo owner automatically when a scheduled run fails (X3 alert).

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: {} # manual "Run workflow" button

concurrency:
  group: ingest
  cancel-in-progress: false

permissions:
  contents: read
  issues: write # for the failure-alert step below

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Run ingestion
        env:
          TM_API_KEY: ${{ secrets.TM_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx src/ingest/run.ts

      # X3 liveness: alert on a failed scheduled run by opening an issue
      # (GitHub also emails the repo owner on scheduled-workflow failure).
      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Ingest workflow failed (run ${context.runId})`;
            const body = `The scheduled ingest failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "ingest-failure",
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["ingest-failure"],
              });
            }
